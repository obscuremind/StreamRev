version: '3.8'

services:
  streamrev:
    build: .
    container_name: streamrev-app
    ports:
      - "5000:5000"
      - "80:80"
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=streamrev
      - DB_PASSWORD=${DB_PASSWORD:-streamrev_password}
      - DB_NAME=streamrev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - FLASK_DEBUG=false
    depends_on:
      - mariadb
      - redis
    volumes:
      - ./streams:/var/streams
      - ./logs:/var/log/streamrev
    restart: unless-stopped
    networks:
      - streamrev-network

  mariadb:
    image: mariadb:10.11
    container_name: streamrev-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=streamrev
      - MYSQL_USER=streamrev
      - MYSQL_PASSWORD=${DB_PASSWORD:-streamrev_password}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    networks:
      - streamrev-network

  redis:
    image: redis:7-alpine
    container_name: streamrev-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - streamrev-network

  nginx:
    image: nginx:alpine
    container_name: streamrev-nginx
    ports:
      - "8080:80"
    volumes:
      - ./configs/nginx.conf.example:/etc/nginx/conf.d/default.conf:ro
      - ./streams:/var/streams:ro
    depends_on:
      - streamrev
    restart: unless-stopped
    networks:
      - streamrev-network

volumes:
  mariadb-data:
  redis-data:

networks:
  streamrev-network:
    driver: bridge
