<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IPTV Panel — Admin</title>
  <style>
    :root {
      --bg-deep: #0d1117;
      --bg-panel: #161b22;
      --bg-elevated: #1c2128;
      --bg-hover: #252c36;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #388bfd;
      --accent-dim: #1f6feb;
      --success: #3fb950;
      --danger: #f85149;
      --warning: #d29922;
      --sidebar-w: 260px;
      --top-h: 56px;
      --radius: 10px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: var(--font); background: var(--bg-deep); color: var(--text); }
    a { color: var(--accent); }
    button, input, select, textarea { font: inherit; color: inherit; }
    input, select, textarea {
      background: var(--bg-deep); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 0.75rem; width: 100%;
    }
    input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent-dim); border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
      padding: 0.45rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-elevated); cursor: pointer; font-size: 0.875rem;
    }
    .btn:hover { background: var(--bg-hover); }
    .btn-primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-danger { background: rgba(248,81,73,0.15); border-color: var(--danger); color: var(--danger); }
    .btn-ghost { background: transparent; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(56,139,253,0.25), transparent), var(--bg-deep);
    }
    .login-card {
      width: 100%; max-width: 400px; padding: 2rem; background: var(--bg-panel);
      border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 24px 48px rgba(0,0,0,0.45);
    }
    .login-card h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .login-card p { margin: 0 0 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    #app { display: none; min-height: 100vh; }
    #app.visible { display: block; }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0; background: var(--bg-panel);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 40;
    }
    .sidebar-brand {
      padding: 1.25rem 1rem; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 1.05rem; letter-spacing: 0.02em;
    }
    .sidebar-brand span { color: var(--accent); }
    .nav-scroll { flex: 1; overflow-y: auto; padding: 0.75rem 0; }
    .nav-item {
      display: flex; align-items: center; gap: 0.65rem; padding: 0.65rem 1.25rem;
      color: var(--text-muted); cursor: pointer; border-left: 3px solid transparent;
      font-size: 0.9rem;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text); }
    .nav-item.active { background: rgba(56,139,253,0.12); color: var(--accent); border-left-color: var(--accent); }
    .nav-icon { width: 1.5rem; text-align: center; font-size: 1.1rem; }
    .main-wrap { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      height: var(--top-h); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem; background: var(--bg-panel); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 30;
    }
    .breadcrumb { font-size: 0.85rem; color: var(--text-muted); }
    .breadcrumb strong { color: var(--text); }
    .user-menu { display: flex; align-items: center; gap: 1rem; font-size: 0.875rem; }
    .content { padding: 1.5rem; flex: 1; }
    .page-title { font-size: 1.35rem; margin: 0 0 1rem; font-weight: 600; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1rem;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.1rem; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-dim));
      opacity: 0.85;
    }
    .stat-card .val { font-size: 1.65rem; font-weight: 700; line-height: 1.2; }
    .stat-card .lbl { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.25rem; }
    .table-wrap {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: auto; max-width: 100%;
    }
    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .data-table th, .data-table td { padding: 0.65rem 0.85rem; text-align: left; border-bottom: 1px solid var(--border); }
    .data-table th { background: var(--bg-elevated); color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .data-table .mono { font-family: ui-monospace, monospace; font-size: 0.8rem; }
    .badge { display: inline-block; padding: 0.15rem 0.45rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge-on { background: rgba(63,185,80,0.2); color: var(--success); }
    .badge-off { background: rgba(248,81,73,0.15); color: var(--danger); }
    .actions { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .pagination {
      display: flex; align-items: center; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;
    }
    .batch-bar {
      display: none; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
      background: rgba(56,139,253,0.12); border: 1px solid var(--accent-dim); border-radius: var(--radius); margin-bottom: 1rem;
    }
    .batch-bar.visible { display: flex; }
    .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 0.6rem 1rem; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      width: 100%; max-width: 560px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .modal.wide { max-width: 720px; }
    .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; font-size: 1.1rem; }
    .modal-body { padding: 1.25rem; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.5rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-grid .full { grid-column: 1 / -1; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    .toasts { position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 200; display: flex; flex-direction: column; gap: 0.5rem; max-width: 360px; }
    .toast {
      padding: 0.85rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg-elevated); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: slideIn 0.2s ease;
    }
    .toast.ok { border-color: var(--success); }
    .toast.err { border-color: var(--danger); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); }
    .sidebar-toggle { display: none; }
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); transition: transform 0.2s; }
      .sidebar.open { transform: translateX(0); }
      .main-wrap { margin-left: 0; }
      .sidebar-toggle { display: inline-flex; }
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <h1>IPTV <span style="color:var(--accent)">Admin</span></h1>
      <p>Sign in with an administrator account.</p>
      <form id="login-form">
        <div class="field"><label>Username</label><input name="username" autocomplete="username" required /></div>
        <div class="field"><label>Password</label><input name="password" type="password" autocomplete="current-password" required /></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
      </form>
    </div>
  </div>

  <div id="app">
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">IPTV <span>Panel</span></div>
        <nav class="nav-scroll" id="main-nav"></nav>
      </aside>
      <div class="main-wrap">
        <header class="topbar">
          <div style="display:flex;align-items:center;gap:1rem">
            <button type="button" class="btn btn-ghost sidebar-toggle" id="btn-sidebar">☰</button>
            <div class="breadcrumb" id="breadcrumb"></div>
          </div>
          <div class="user-menu">
            <span id="top-username"></span>
            <button type="button" class="btn btn-sm" id="btn-logout">Logout</button>
          </div>
        </header>
        <main class="content" id="main-content"></main>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-form">
    <div class="modal wide" role="dialog">
      <div class="modal-header"><h2 id="modal-form-title">Edit</h2><button type="button" class="btn btn-ghost btn-sm" data-close-modal>✕</button></div>
      <div class="modal-body" id="modal-form-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn" data-close-modal>Cancel</button>
        <button type="button" class="btn btn-primary" id="modal-form-save">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-confirm">
    <div class="modal" role="dialog">
      <div class="modal-header"><h2>Confirm</h2><button type="button" class="btn btn-ghost btn-sm" data-close-confirm>✕</button></div>
      <div class="modal-body" id="modal-confirm-msg"></div>
      <div class="modal-footer">
        <button type="button" class="btn" data-close-confirm>Cancel</button>
        <button type="button" class="btn btn-danger" id="modal-confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script>
(function () {
  const API = "/api/admin";
  const LS = { access: "iptv_admin_access", refresh: "iptv_admin_refresh", user: "iptv_admin_username" };

  const NAV = [
    { id: "dashboard", label: "Dashboard", icon: "📊" },
    { id: "streams", label: "Streams", icon: "📡" },
    { id: "users", label: "Users", icon: "👤" },
    { id: "vod", label: "VOD", icon: "🎬" },
    { id: "categories", label: "Categories", icon: "📁" },
    { id: "bouquets", label: "Bouquets", icon: "💐" },
    { id: "servers", label: "Servers", icon: "🖥️" },
    { id: "epg", label: "EPG", icon: "📅" },
    { id: "devices", label: "Devices (MAG/E2)", icon: "📺" },
    { id: "providers", label: "Providers", icon: "🌐" },
    { id: "resellers", label: "Resellers", icon: "🏪" },
    { id: "packages", label: "Packages", icon: "📦" },
    { id: "lines", label: "Lines / Connections", icon: "🔗" },
    { id: "tools", label: "Tools", icon: "🔧" },
    { id: "security", label: "Security", icon: "🛡️" },
    { id: "logs", label: "Logs", icon: "📋" },
    { id: "backups", label: "Backups", icon: "💾" },
    { id: "diagnostics", label: "Diagnostics", icon: "🔬" },
    { id: "tickets", label: "Tickets", icon: "🎫" },
    { id: "settings", label: "Settings", icon: "⚙️" }
  ];

  const state = {
    section: "dashboard",
    page: 1,
    perPage: 25,
    vodTab: "movies",
    selected: new Set(),
    batchEntity: null,
    modalSaveHandler: null,
    confirmHandler: null,
    categoriesCache: [],
    serversCache: [],
    seriesForEpisodes: null
  };

  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => [...r.querySelectorAll(s)];

  function toast(msg, type) {
    const el = document.createElement("div");
    el.className = "toast " + (type === "error" ? "err" : "ok");
    el.textContent = msg;
    $("#toasts").appendChild(el);
    setTimeout(() => { el.remove(); }, 4200);
  }

  function getToken() { return localStorage.getItem(LS.access); }

  async function api(path, opts = {}) {
    const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
    const t = getToken();
    if (t) headers.Authorization = "Bearer " + t;
    const res = await fetch(API + path, Object.assign({}, opts, { headers }));
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch (_) { data = text; }
    if (res.status === 401) {
      logout();
      toast("Session expired. Please login again.", "error");
      throw new Error("unauthorized");
    }
    if (!res.ok) {
      const detail = (data && data.detail) ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail)) : (text || res.statusText);
      throw new Error(detail || "Request failed");
    }
    return data;
  }

  function showApp(on) {
    $("#login-screen").style.display = on ? "none" : "flex";
    $("#app").classList.toggle("visible", on);
  }

  function logout() {
    localStorage.removeItem(LS.access);
    localStorage.removeItem(LS.refresh);
    localStorage.removeItem(LS.user);
    showApp(false);
  }

  function setBreadcrumb() {
    const item = NAV.find((n) => n.id === state.section);
    $("#breadcrumb").innerHTML = "Admin / <strong>" + (item ? item.label : state.section) + "</strong>";
  }

  function openModalForm(title, bodyHtml, onSave) {
    $("#modal-form-title").textContent = title;
    $("#modal-form-body").innerHTML = bodyHtml;
    $("#modal-form").classList.add("open");
    state.modalSaveHandler = onSave;
  }

  function closeModalForm() {
    $("#modal-form").classList.remove("open");
    state.modalSaveHandler = null;
    const sb = $("#modal-form-save");
    if (sb) { sb.style.display = ""; sb.textContent = "Save"; sb.onclick = null; }
  }

  function openConfirm(msg, onOk) {
    $("#modal-confirm-msg").textContent = msg;
    $("#modal-confirm").classList.add("open");
    state.confirmHandler = onOk;
  }

  function closeConfirm() {
    $("#modal-confirm").classList.remove("open");
    state.confirmHandler = null;
  }

  function esc(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
  }

  function paginationHtml(total) {
    const pages = Math.max(1, Math.ceil(total / state.perPage) || 1);
    const p = Math.min(state.page, pages);
    return '<div class="pagination">' +
      '<span style="color:var(--text-muted);font-size:0.85rem">' + total + " total</span>" +
      '<button type="button" class="btn btn-sm" data-page="prev"' + (p <= 1 ? " disabled" : "") + ">Prev</button>" +
      "<span>Page " + p + " / " + pages + "</span>" +
      '<button type="button" class="btn btn-sm" data-page="next"' + (p >= pages ? " disabled" : "") + ">Next</button>" +
      '<label style="display:flex;align-items:center;gap:0.35rem;font-size:0.85rem;color:var(--text-muted)">Per page ' +
      '<select id="per-page-sel" style="width:auto">' +
      [10, 25, 50, 100].map((n) => '<option value="' + n + '"' + (n === state.perPage ? " selected" : "") + ">" + n + "</option>").join("") +
      "</select></label></div>";
  }

  function bindPagination(onChange) {
    $$("[data-page]").forEach((b) => b.addEventListener("click", () => {
      const pages = Math.max(1, Math.ceil(onChange.total / state.perPage));
      if (b.dataset.page === "prev") state.page = Math.max(1, state.page - 1);
      if (b.dataset.page === "next") state.page = Math.min(pages, state.page + 1);
      onChange.load();
    }));
    const sel = $("#per-page-sel");
    if (sel) sel.addEventListener("change", () => { state.perPage = +sel.value; state.page = 1; onChange.load(); });
  }

  function clearSelection() {
    state.selected.clear();
    state.batchEntity = null;
    $(".batch-bar") && ($(".batch-bar").classList.remove("visible"), $(".batch-bar").innerHTML = "");
  }

  function updateBatchBar(entity, label) {
    let bar = $(".batch-bar");
    if (!bar) {
      bar = document.createElement("div");
      bar.className = "batch-bar";
      $("#main-content").insertBefore(bar, $("#main-content").firstChild.nextSibling);
    }
    state.batchEntity = entity;
    const n = state.selected.size;
    bar.classList.toggle("visible", n > 0);
    bar.innerHTML = n ? '<span><strong>' + n + "</strong> " + label + ' selected</span>' +
      '<button type="button" class="btn btn-sm btn-primary" data-batch="enable">Enable</button>' +
      '<button type="button" class="btn btn-sm" data-batch="disable">Disable</button>' +
      '<button type="button" class="btn btn-sm btn-danger" data-batch="delete">Delete</button>' +
      '<button type="button" class="btn btn-sm btn-ghost" data-batch="clear">Clear</button>' : "";
    $$("[data-batch]", bar).forEach((btn) => btn.addEventListener("click", () => batchAction(btn.dataset.batch)));
  }

  async function batchAction(action) {
    const ids = [...state.selected];
    if (!ids.length) return;
    try {
      if (action === "clear") { clearSelection(); render(); return; }
      if (action === "delete") {
        openConfirm("Delete " + ids.length + " item(s)? This cannot be undone.", async () => {
          closeConfirm();
          const path = state.batchEntity === "streams" ? "/streams/batch/delete" : "/users/batch/delete";
          await api(path, { method: "POST", body: JSON.stringify({ ids }) });
          toast("Deleted " + ids.length + " items");
          clearSelection();
          render();
        });
        return;
      }
      const path = state.batchEntity === "streams"
        ? (action === "enable" ? "/streams/batch/enable" : "/streams/batch/disable")
        : (action === "enable" ? "/users/batch/enable" : "/users/batch/disable");
      const r = await api(path, { method: "POST", body: JSON.stringify({ ids }) });
      toast("Updated: " + (r.affected != null ? r.affected : ids.length));
      clearSelection();
      render();
    } catch (e) { toast(e.message, "error"); }
  }

  async function loadCategories() {
    try {
      const r = await api("/categories?per_page=500&page=1");
      state.categoriesCache = r.items || [];
    } catch (_) { state.categoriesCache = []; }
  }

  async function loadServers() {
    try { state.serversCache = await api("/servers"); } catch (_) { state.serversCache = []; }
  }

  function categoryOptions(selectedId) {
    return '<option value="">—</option>' + state.categoriesCache.map((c) =>
      '<option value="' + c.id + '"' + (c.id === selectedId ? " selected" : "") + ">" + esc(c.category_name) + " (" + esc(c.category_type) + ")</option>"
    ).join("");
  }

  /* ——— Dashboard ——— */
  async function renderDashboard() {
    $("#main-content").innerHTML = '<h1 class="page-title">Dashboard</h1><div class="stats-grid" id="dash-stats"></div>';
    try {
      const s = await api("/dashboard/summary");
      const cards = [];
      const flat = (obj, prefix) => {
        if (obj == null) return;
        if (typeof obj !== "object") {
          cards.push({ label: prefix, val: obj });
          return;
        }
        for (const k of Object.keys(obj)) {
          const v = obj[k];
          const key = prefix ? prefix + " · " + k : k;
          if (v != null && typeof v === "object" && !Array.isArray(v)) flat(v, key);
          else cards.push({ label: key.replace(/_/g, " "), val: v });
        }
      };
      flat(s, "");
      $("#dash-stats").innerHTML = cards.map((c) =>
        '<div class="stat-card"><div class="val">' + esc(c.val) + '</div><div class="lbl">' + esc(c.label) + "</div></div>"
      ).join("") || '<p class="empty-state">No stats</p>';
    } catch (e) {
      $("#dash-stats").innerHTML = '<p class="empty-state">' + esc(e.message) + "</p>";
    }
  }

  /* ——— Streams ——— */
  async function renderStreams() {
    clearSelection();
    $("#main-content").innerHTML =
      '<h1 class="page-title">Streams</h1><div class="toolbar">' +
      '<input type="search" id="stream-search" placeholder="Search…" style="max-width:220px" />' +
      '<select id="stream-cat" style="max-width:160px"><option value="">Loading…</option></select>' +
      '<select id="stream-en" style="width:auto"><option value="">Any status</option><option value="true">Enabled</option><option value="false">Disabled</option></select>' +
      '<button type="button" class="btn btn-primary" id="btn-stream-search">Search</button>' +
      '<button type="button" class="btn" id="btn-stream-new">+ New stream</button></div>' +
      '<div class="table-wrap"><table class="data-table"><thead><tr>' +
      '<th><input type="checkbox" id="chk-all" /></th><th>ID</th><th>Name</th><th>Category</th><th>Enabled</th><th>Actions</th></tr></thead><tbody id="tbody"></tbody></table></div>' +
      paginationHtml(0);

    async function load() {
      let items, total;
      const searchVal = $("#stream-search").value.trim();
      try {
        if (searchVal) {

  function editStream(id) {

    const body = $("#modal-form-body");
    body.innerHTML =

      '<div class="field"><label>Archive server ID</label><input name="tv_archive_server_id" type="number" /></div>' +

    const fill = (row) => {
      for (const el of $$("[name]", body)) {
        const n = el.name;
        if (el.type === "checkbox") el.checked = !!row[n];
        else if (row[n] != null) el.value = row[n];
      }
    };

    (async () => {
      if (!isNew) {
        try { fill(await api("/streams/" + id)); } catch (e) { toast(e.message, "error"); closeModalForm(); return; }
      }
    })();

    $("#modal-form-save").onclick = async () => {
      const get = (n) => {
        const el = body.querySelector("[name=\"" + n + "\"]");
        if (!el) return undefined;
        if (el.type === "checkbox") return el.checked;
        if (el.type === "number") return el.value === "" ? null : +el.value;
        const v = el.value.trim();
        if (n === "category_id" && v === "") return null;
        return v === "" ? null : v;
      };
      const payload = {
        stream_display_name: get("stream_display_name"),
        stream_source: get("stream_source"),
        stream_icon: get("stream_icon"),
        epg_channel_id: get("epg_channel_id"),
        category_id: get("category_id") != null && get("category_id") !== "" ? +get("category_id") : get("category_id"),
        stream_type: get("stream_type"),
        enabled: get("enabled"),
        direct_source: get("direct_source"),
        read_native: get("read_native"),
        stream_all: get("stream_all"),
        allow_record: get("allow_record"),
        notes: get("notes"),
        target_container: get("target_container"),
        tv_archive: get("tv_archive"),
        tv_archive_duration: get("tv_archive_duration"),
        tv_archive_server_id: get("tv_archive_server_id"),
        order: get("order"),
        custom_ffmpeg: get("custom_ffmpeg"),
        custom_sid: get("custom_sid")
      };
      if (!payload.stream_display_name) { toast("Name required", "error"); return; }
      try {
        if (isNew) await api("/streams", { method: "POST", body: JSON.stringify(payload) });
        else await api("/streams/" + id, { method: "PUT", body: JSON.stringify(payload) });
        toast("Saved"); closeModalForm(); render();
      } catch (e) { toast(e.message, "error"); }
    };

    const probBtn = body.querySelector("#btn-probe-stream");
    if (probBtn) probBtn.onclick = async () => {
      const url = body.querySelector("[name=stream_source]").value.trim();
      if (!url) { toast("Enter a source URL first", "error"); return; }
      toast("Probing...");
      try {
        const r = id ? await api("/streams/" + id + "/probe", { method: "POST", body: JSON.stringify({ url }) }) : await api("/streams/1/probe", { method: "POST", body: JSON.stringify({ url }) });
        const res = body.querySelector("[name=probed_resolution]");
        if (r.probe_result && r.probe_result.streams) {
          const vs = r.probe_result.streams.find((s) => s.codec_type === "video");
          if (vs) res.value = vs.width + "x" + vs.height;
          else res.value = "No video stream";
        } else res.value = "Probe returned no data";
        toast("Probe complete");
      } catch (e) { toast(e.message, "error"); }
    };
    const statusBtn = body.querySelector("#btn-stream-status");
    if (statusBtn && id) statusBtn.onclick = async () => {
      try {
        const r = await api("/streams/" + id + "/status");
        toast("Stream " + id + ": " + (r.running ? "RUNNING (PID " + r.pid + ")" : "STOPPED"));
      } catch (e) { toast(e.message, "error"); }
    };
  }

          const row = await api("/bouquets/" + id);

          const j = JSON.parse(txt.trim() || "[]");

      let ch, mv, se, ra;

        ch = parseArr(body.querySelector("[name=bouquet_channels]").value);
        mv = parseArr(body.querySelector("[name=bouquet_movies]").value);
        se = parseArr(body.querySelector("[name=bouquet_series]").value);

      } catch (e) { toast(e.message, "error"); }

        const rows = f ? all.filter((s) => (s.key || "").toLowerCase().includes(f)) : all;
        $("#tbody").innerHTML = rows.map((row) =>
          "<tr><td>" + row.id + "</td><td class=\"mono\">" + esc(row.key) + "</td><td>" + esc(typeof row.value === "object" ? JSON.stringify(row.value) : row.value) + "</td><td>" + esc(row.value_type) + "</td>" +
          '<td class="actions"><button type="button" class="btn btn-sm" data-e="' + row.id + '">Edit</button> ' +
          '<button type="button" class="btn btn-sm btn-danger" data-d="' + row.id + '">Delete</button></td></tr>'
        ).join("") || '<tr><td colspan="5" class="empty-state">No settings</td></tr>';
        $$("[data-e]").forEach((b) => b.onclick = () => editSetting(+b.dataset.e));
        $$("[data-d]").forEach((b) => b.onclick = () => openConfirm("Delete this setting row?", async () => {
          try { await api("/settings/" + b.dataset.d, { method: "DELETE" }); closeConfirm(); toast("Deleted"); load(); } catch (e) { toast(e.message, "error"); }
        }));
      } catch (e) { $("#tbody").innerHTML = '<tr><td colspan="5">' + esc(e.message) + "</td></tr>"; }
    }
    $("#set-q").oninput = () => load();
    $("#set-new").onclick = () => editSetting(null);
    await load();
  }

  function editSetting(id) {
    const isNew = id == null;
    openModalForm(isNew ? "New setting" : "Edit setting", "", null);
    const body = $("#modal-form-body");
    body.innerHTML =
      '<div class="form-grid">' +
      '<div class="full field"><label>Key *</label><input name="key" required ' + (isNew ? "" : "readonly style=\"opacity:0.7\"") + " /></div>" +
      '<div class="field"><label>Value type</label><select name="value_type"><option>string</option><option>int</option><option>bool</option><option>json</option></select></div>' +
      '<div class="full field"><label>Value</label><textarea name="value" rows="3"></textarea></div></div>';
    (async () => {
      if (!isNew) {
        try {
          const row = await api("/settings/" + id);
          body.querySelector("[name=key]").value = row.key;
          body.querySelector("[name=value_type]").value = row.value_type;
          body.querySelector("[name=value]").value = typeof row.value === "object" ? JSON.stringify(row.value) : String(row.value ?? "");
        } catch (e) { toast(e.message, "error"); closeModalForm(); }
      }
    })();
    $("#modal-form-save").onclick = async () => {
      const key = body.querySelector("[name=key]").value.trim();
      const vt = body.querySelector("[name=value_type]").value;
      let val = body.querySelector("[name=value]").value;
      if (vt === "json") { try { val = JSON.parse(val || "null"); } catch (_) { return toast("Invalid JSON value", "error"); } }
      if (vt === "int") val = +val;
      if (vt === "bool") val = val === "true" || val === "1";
      try {
        if (isNew) await api("/settings", { method: "POST", body: JSON.stringify({ key, value: val, value_type: vt }) });
        else await api("/settings/" + id, { method: "PUT", body: JSON.stringify({ value: val, value_type: vt }) });
        toast("Saved"); closeModalForm(); render();
      } catch (e) { toast(e.message, "error"); }
    };
  }

  /* ——— Router ——— */
  function render() {
    clearSelection();
    setBreadcrumb();
    const map = {
      dashboard: renderDashboard,
      streams: renderStreams,
      users: renderUsers,
      vod: renderVod,
      categories: renderCategories,
      bouquets: renderBouquets,
      servers: renderServers,
      epg: renderEpg,
      devices: renderDevices,
      providers: renderProviders,
      resellers: renderResellers,
      packages: renderPackages,
      lines: renderLines,
      tools: renderTools,
      security: renderSecurity,
      logs: renderLogs,
      backups: renderBackups,
      diagnostics: renderDiagnostics,
      tickets: renderTickets,
      settings: renderSettings
    };
    (map[state.section] || renderDashboard)().catch((e) => toast(e.message, "error"));
  }

  function navigate(section) {
    state.section = section;
    state.page = 1;
    $$(".nav-item").forEach((el) => el.classList.toggle("active", el.dataset.nav === section));
    const cur = (location.hash || "").replace(/^#/, "");
    if (cur !== section) {
      location.hash = section;
      return;
    }
    render();
  }

  function initNav() {
    $("#main-nav").innerHTML = NAV.map((n) =>
      '<div class="nav-item" data-nav="' + n.id + '"><span class="nav-icon">' + n.icon + "</span>" + esc(n.label) + "</div>"
    ).join("");
    $$(".nav-item").forEach((el) => el.addEventListener("click", () => navigate(el.dataset.nav)));
  }

  $("#login-form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    try {
      const data = await fetch(API + "/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: fd.get("username"), password: fd.get("password") })
      }).then(async (r) => {
        const t = await r.text();
        let j; try { j = JSON.parse(t); } catch (_) { j = {}; }
        if (!r.ok) throw new Error(j.detail || r.statusText);
        return j;
      });
      localStorage.setItem(LS.access, data.access_token);
      localStorage.setItem(LS.refresh, data.refresh_token);
      localStorage.setItem(LS.user, data.username);
      showApp(true);
      $("#top-username").textContent = data.username;
      initNav();
      const h = (location.hash || "").replace(/^#/, "");
      if (h && NAV.some((n) => n.id === h)) state.section = h;
      navigate(state.section);
      toast("Welcome back");
    } catch (e) { toast(e.message, "error"); }
  });

  $("#btn-logout").addEventListener("click", logout);
  $("#btn-sidebar").addEventListener("click", () => $("#sidebar").classList.toggle("open"));

  $$("[data-close-modal]").forEach((b) => b.addEventListener("click", closeModalForm));
  $("#modal-form").addEventListener("click", (ev) => { if (ev.target.id === "modal-form") closeModalForm(); });

  $$("[data-close-confirm]").forEach((b) => b.addEventListener("click", closeConfirm));
  $("#modal-confirm").addEventListener("click", (ev) => { if (ev.target.id === "modal-confirm") closeConfirm(); });
  $("#modal-confirm-ok").addEventListener("click", () => { if (state.confirmHandler) state.confirmHandler(); });

  window.addEventListener("hashchange", () => {
    const h = (location.hash || "").replace(/^#/, "");
    if (!getToken()) return;
    if (h && NAV.some((n) => n.id === h)) {
      state.section = h;
      state.page = 1;
      $$(".nav-item").forEach((el) => el.classList.toggle("active", el.dataset.nav === h));
      render();
    }
  });

  if (getToken()) {
    showApp(true);
    $("#top-username").textContent = localStorage.getItem(LS.user) || "Admin";
    initNav();
    const h = (location.hash || "").replace(/^#/, "");
    if (h && NAV.some((n) => n.id === h)) state.section = h;
    render();
  }
})();
  </script>
